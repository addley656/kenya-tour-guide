<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="booking">

    <h2>Admin Dashboard</h2>

    <button onclick="logout()">
        Logout
    </button>

    <br><br>

    <div id="bookings"></div>

</section>

<script>

const token =
    localStorage.getItem("token");

if(!token){

    window.location.href =
        "admin.html";

}

async function loadBookings(){

    try{

        const response = await fetch(
            "https://kenya-tour-guide.onrender.com/admin/dashboard",
            {
                headers:{
                    Authorization:
                        `Bearer ${token}`
                }
            }
        );

        const bookings =
            await response.json();

        const container =
            document.getElementById(
                "bookings"
            );

        bookings.forEach(
            booking => {

                container.innerHTML += `
                    <div class="booking-card">
                        <h3>${booking.name}</h3>
                        <p>${booking.destination}</p>
                        <p>${booking.date}</p>
                    </div>
                `;

            }
        );

    }
    catch(error){

        console.log(error);

    }

}

function logout(){

    localStorage.removeItem(
        "token"
    );

    window.location.href =
        "admin.html";

}

loadBookings();

</script>

</body>
</html>
